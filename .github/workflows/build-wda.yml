name: Build WDA IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install appium-webdriveragent
        run: npm install appium-webdriveragent@11.4.1

      - name: Build WDA with custom bundle ID
        run: |
          cd node_modules/appium-webdriveragent
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination "generic/platform=iOS" \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.tiktokbot.WebDriverAgentRunner \
            2>&1 | tail -80

      - name: Ad-hoc sign all binaries
        run: |
          cd node_modules/appium-webdriveragent
          APP_PATH=$(find DerivedData -name "*.app" -path "*WebDriverAgentRunner-Runner*" ! -path "*.dSYM*" | head -1)
          echo "Signing: $APP_PATH"
          find "$APP_PATH" -name "*.framework" -o -name "*.dylib" | while read f; do
            codesign -s - --force "$f" 2>/dev/null || true
          done
          find "$APP_PATH/PlugIns" -name "*.xctest" | while read f; do
            codesign -s - --force --deep "$f" 2>/dev/null || true
          done
          codesign -s - --force --deep "$APP_PATH"
          echo "Signed successfully"

      - name: Package IPA
        run: |
          cd node_modules/appium-webdriveragent
          APP_PATH=$(find DerivedData -name "*.app" -path "*WebDriverAgentRunner-Runner*" ! -path "*.dSYM*" | head -1)
          echo "App path: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r WebDriverAgentRunner.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner
          path: node_modules/appium-webdriveragent/WebDriverAgentRunner.ipa
          retention-days: 30
