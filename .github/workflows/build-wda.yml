name: Build WDA IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install appium-webdriveragent
        run: npm install appium-webdriveragent@11.4.1

      - name: Build WDA
        run: |
          cd node_modules/appium-webdriveragent
          xcodebuild build-for-testing -project WebDriverAgent.xcodeproj -scheme WebDriverAgentRunner -destination "generic/platform=iOS" -derivedDataPath DerivedData CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO ONLY_ACTIVE_ARCH=NO 2>&1 | tail -80

      - name: Package IPA
        run: |
          cd node_modules/appium-webdriveragent
          APP_PATH=$(find DerivedData -name "*.app" -path "*WebDriverAgentRunner*" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r WebDriverAgentRunner.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner
          path: node_modules/appium-webdriveragent/WebDriverAgentRunner.ipa
          retention-days: 30
